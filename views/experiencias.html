<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Experiencias exclusivas en Quito - Tours, gastronomía y cultura con Villa de Sant.">
    <title>Experiencias en Quito | Villa de Sant</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Core CSS (Order matters) -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/header-footer.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">

    <!-- Core JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="../assets/js/components.js" defer></script>
    <script src="../assets/js/main.js" defer></script>
    <script src="../assets/js/chat-widget.js" defer></script>
    <style>
        .exp-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .exp-grid {
                grid-template-columns: 1fr;
            }
        }

        .exp-card {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .exp-img {
            height: 220px;
            overflow: hidden;
        }

        .exp-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .exp-card:hover .exp-img img {
            transform: scale(1.1);
        }

        .exp-body {
            padding: 30px;
        }

        .exp-body h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .exp-body p {
            color: var(--text-gray);
            margin-bottom: 20px;
            font-size: 0.85rem;
            flex-grow: 1;
        }

        .exp-body .btn {
            padding: 10px;
            font-size: 0.8rem;
            width: 100%;
            text-align: center;
        }

        /* Image Marquee Styles for Amenities */
        .exp-infinite-carousel {
            background-color: var(--bg-black);
            overflow: hidden;
            margin-top: 50px;
        }

        body.light-mode .exp-infinite-carousel {
            background-color: #F5F5F7;
        }

        .pic-marquee-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
        }

        .pic-marquee-content {
            display: flex;
            width: max-content;
            animation: marquee-scroll 25s linear infinite;
            gap: 30px;
        }

        .pic-marquee-content:hover {
            animation-play-state: paused;
        }

        @keyframes float-pulse {
            0% {
                transform: translateY(0);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            }

            50% {
                transform: translateY(-8px);
                box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
                border-color: rgba(212, 175, 55, 0.5);
            }

            100% {
                transform: translateY(0);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            }
        }

        .exp-pic-card {
            width: 280px;
            height: 380px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 25px;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: float-pulse 4s ease-in-out infinite alternate;
        }

        .exp-pic-card:nth-child(even) {
            animation-delay: 1.5s;
        }

        .exp-pic-card:nth-child(3n) {
            animation-delay: 0.7s;
        }

        .exp-pic-card img.bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: transform 0.6s ease;
        }

        .exp-pic-card:hover img.bg-img {
            transform: scale(1.1);
        }

        .exp-pic-card:hover {
            border-color: var(--primary-gold);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        /* Gradient Overlays */
        .exp-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .grad-pool {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 70, 120, 0.95) 100%);
        }

        .grad-laundry {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(60, 70, 80, 0.95) 100%);
        }

        .grad-pets {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(90, 50, 10, 0.95) 100%);
        }

        .grad-room {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(40, 30, 10, 0.95) 100%);
        }

        .grad-rest {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(100, 20, 20, 0.95) 100%);
        }

        .grad-gym {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(30, 30, 30, 0.95) 100%);
        }

        .grad-bar {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(60, 10, 80, 0.95) 100%);
        }

        .grad-park {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(20, 40, 50, 0.95) 100%);
        }

        .exp-pic-content {
            position: relative;
            z-index: 3;
            color: white;
            width: 100%;
        }

        .exp-pic-content h4 {
            font-size: 1.3rem;
            margin-top: 10px;
            font-family: 'Playfair Display', serif;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .exp-pic-content .exp-icon {
            font-size: 2.2rem;
            color: var(--primary-gold);
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.5));
            display: inline-block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <section class="page-hero">
        <div class="page-hero-bg" id="hero-bg"
            style="background-image: url('https://lh3.googleusercontent.com/gps-cs-s/AHVAwerfdPRz75mHQrQNhr6FN-495Ez88UUW2bu96-q-fw80MPoEs3h8sq1LClWXUI4B1dBEgmXaQq-Gx0bjV2JQXw1tgIZiTJtrfYbCaD2SD-LLQ-VXsYMDcSUUuHgoYBu7yo9vXMWlAA=s4000')">
        </div>
        <div class="page-hero-overlay"></div>
        <div class="page-hero-content">
            <div id="exp-lottie" class="lottie-hummingbird page-lottie"></div>
            <div class="page-hero-divider"></div>
            <h1 class="page-hero-title serif gold-text">Experiencias de Usuario</h1>
            <p class="page-hero-sub">Vive la exclusividad y el confort supremo dentro de nuestro santuario.</p>
        </div>
    </section>

    <main class="section-padding">
        <div class="container">


            <!-- Double Masonry Collage (Two side-by-side grids) -->
            <style>
                .double-collage-wrapper {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 30px;
                    margin-bottom: 40px;
                }

                .photo-collage-grid {
                    display: grid;
                    grid-template-columns: repeat(3, 1fr);
                    grid-gap: 15px;
                    grid-auto-rows: 200px;
                }

                .pcg-item {
                    border-radius: 8px;
                    overflow: hidden;
                    position: relative;
                    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
                    background: var(--bg-card);
                }

                .pcg-item img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                }

                .pcg-item:hover img {
                    transform: scale(1.05);
                }

                /* Layout Spans matching image */
                .pcg-1 {
                    grid-column: span 2;
                }

                .pcg-2 {
                    grid-column: span 1;
                }

                .pcg-3 {
                    grid-column: span 1;
                    grid-row: span 2;
                }

                /* Left portrait */
                .pcg-4 {
                    grid-column: span 2;
                    grid-row: span 2;
                }

                /* Right large */
                .pcg-5 {
                    grid-column: span 1;
                }

                .pcg-6 {
                    grid-column: span 1;
                }

                .pcg-7 {
                    grid-column: span 1;
                }

                @media (max-width: 1200px) {
                    .photo-collage-grid {
                        grid-auto-rows: 150px;
                    }
                }

                @media (max-width: 900px) {
                    .double-collage-wrapper {
                        grid-template-columns: 1fr;
                        /* Stack vertically on smaller screens */
                    }

                    .photo-collage-grid {
                        grid-auto-rows: 200px;
                    }
                }

                @media (max-width: 600px) {
                    .photo-collage-grid {
                        grid-template-columns: repeat(2, 1fr);
                        grid-auto-rows: 150px;
                        grid-gap: 10px;
                    }

                    .pcg-1 {
                        grid-column: span 2;
                    }

                    .pcg-2,
                    .pcg-3 {
                        grid-column: span 1;
                        grid-row: span 1;
                    }

                    .pcg-4 {
                        grid-column: span 2;
                        grid-row: span 2;
                    }

                    .pcg-5,
                    .pcg-6 {
                        grid-column: span 1;
                    }

                    .pcg-7 {
                        grid-column: span 2;
                    }
                }
            </style>

            <div class="double-collage-wrapper">
                <!-- LEFT COLLAGE -->
                <div class="photo-collage-grid">
                    <!-- Row 1 -->
                    <div class="pcg-item pcg-1 scroll-anim scroll-fade"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipMIQr7TRGo_LxBf6Y6uQFMdudqUH53FkN0YOmQy=s4000"
                            alt="Spa and Wellness" loading="lazy"></div>
                    <div class="pcg-item pcg-2 scroll-anim scroll-fade" style="transition-delay: 0.1s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipOUY0uL1F_v_8dGPVe0ynf_3RW2WLzdV7YcKVbK=s4000"
                            alt="Breakfast in bed" loading="lazy"></div>

                    <!-- Row 2 -->
                    <div class="pcg-item pcg-3 scroll-anim scroll-left"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipNszXIbjjvNsY0MnxFayR8jadWS4bkzKXzM4S-V=s4000"
                            alt="Suite Interior" loading="lazy"></div>
                    <div class="pcg-item pcg-4 scroll-anim scroll-right"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipPsTeTQJsqrOLbm2XuJkVvUDWZAzqKeFBKRCCzV=s4000"
                            alt="Romantic Dinner" loading="lazy"></div>

                    <!-- Row 3 -->
                    <div class="pcg-item pcg-5 scroll-anim scroll-fade" style="transition-delay: 0s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipMH0RIOsR6SSH6-qJWUHQlRE2kJbF5ESYcu7YeK=s4000"
                            alt="Cocktail Bar" loading="lazy"></div>
                    <div class="pcg-item pcg-6 scroll-anim scroll-fade" style="transition-delay: 0.1s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipN61bcdk8i8V6AyzVG5GNozm719rMIJvjqyJA5B=s4000"
                            alt="Pool Area" loading="lazy"></div>
                    <div class="pcg-item pcg-7 scroll-anim scroll-fade" style="transition-delay: 0.2s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipNATS45KlmlfIf3e_kUtLZ84n5yk2gFvtAnysnc=s4000"
                            alt="Beautiful Patio" loading="lazy"></div>
                </div>

                <!-- RIGHT COLLAGE (Duplicate to form the Double Grid) -->
                <div class="photo-collage-grid" style="position: relative;">
                    <!-- Line separator mimicking the blue line if needed, but flex gap works fine -->
                    <!-- Row 1 -->
                    <div class="pcg-item pcg-1 scroll-anim scroll-fade"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipMmnjV0M4xUEjDw-0RaGFiNhANIB6XM-I_a6War=s4000"
                            alt="Spa and Wellness" loading="lazy"></div>
                    <div class="pcg-item pcg-2 scroll-anim scroll-fade" style="transition-delay: 0.1s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipPEkKnDj6Keln7IrPTru8JI35soB7ZoTxarN4TX=s4000"
                            alt="Breakfast in bed" loading="lazy"></div>

                    <!-- Row 2 -->
                    <div class="pcg-item pcg-3 scroll-anim scroll-left"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipPfiPxrqUxywypEypkcJmtUCocUPEF5O8J0fWpr=s4000"
                            alt="Suite Interior" loading="lazy"></div>
                    <div class="pcg-item pcg-4 scroll-anim scroll-right"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipM4zBSQkctyMdsOZkeLBrD9lZCFWnuMjly3xqM-=s4000"
                            alt="Romantic Dinner" loading="lazy"></div>

                    <!-- Row 3 -->
                    <div class="pcg-item pcg-5 scroll-anim scroll-fade" style="transition-delay: 0s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipNyCSzQQwHRrwSijTJjGdxpD9KUzSzTSoS-UaBk=s4000"
                            alt="Cocktail Bar" loading="lazy"></div>
                    <div class="pcg-item pcg-6 scroll-anim scroll-fade" style="transition-delay: 0.1s;"><img
                            src="https://lh3.googleusercontent.com/gps-cs-s/AHVAweqDLJ0lb7qdYdAKL6QpexVOe0dAqmXpXUXq_CeHQp_HXJQz7bO03dEOBKLxL1-NOtzeITMWLR4QdxmsVjw4U6v9j4jfOTvlOUeMei2Nvo49nsuFiyPaY9GoVz0uoS-S8BOTZJz-2w=s4000"
                            alt="Pool Area" loading="lazy"></div>
                    <div class="pcg-item pcg-7 scroll-anim scroll-fade" style="transition-delay: 0.2s;"><img
                            src="https://lh3.googleusercontent.com/p/AF1QipOdcJEEhb35hoq33uFBCeTcjLoNeIKDjisGpll4=s4000"
                            alt="Beautiful Patio" loading="lazy"></div>
                </div>
            </div>
        </div>

        <!-- 360 Viewer Section Layout & Gradients -->
        <style>
            .section-360-bg {
                margin-top: 60px;
                border-top: 1px solid rgba(212, 175, 55, 0.2);
                border-bottom: 1px solid rgba(212, 175, 55, 0.2);
                background: linear-gradient(135deg, #0a110a 0%, #000000 100%);
            }

            body.light-mode .section-360-bg {
                background: linear-gradient(135deg, #fdfbf7 0%, #ffffff 100%);
            }
        </style>
        <section class="section-padding section-360-bg">
            <div class="container text-center scroll-anim scroll-fade">
                <p
                    style="color: var(--primary-gold); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; font-size: 0.85rem; margin-bottom: 10px;">
                    <i class="fa-solid fa-vr-cardboard" style="margin-right: 8px;"></i>Exploración Virtual
                </p>
                <h2 class="serif gold-text" style="font-size: 2.5rem; margin-bottom: 15px;">Recorridos 360°</h2>
                <p style="color: var(--text-gray); max-width: 600px; margin: 0 auto 40px;">Siente el ambiente antes de
                    llegar. Explora nuestras elegantes instalaciones desde cualquier ángulo en total inmersión.</p>

                <style>
                    .tour-360-grid {
                        display: grid;
                        grid-template-columns: repeat(2, 1fr);
                        gap: 30px;
                        width: 100%;
                        max-width: 1000px;
                        margin: 0 auto;
                    }

                    .tour-360-item {
                        height: 350px;
                        border-radius: 12px;
                        overflow: hidden;
                        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
                        border: 1px solid rgba(212, 175, 55, 0.3);
                        position: relative;
                        background: #000;
                    }

                    @media (max-width: 900px) {
                        .tour-360-grid {
                            grid-template-columns: 1fr;
                        }

                        .tour-360-item {
                            height: 300px;
                        }
                    }
                </style>

                <div class="tour-360-grid scroll-anim scroll-fade">
                    <!-- Viewer 1 -->
                    <div class="tour-360-item">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!4v1680000000000!6m8!1m7!1sCIHM0ogKEICAgIDssrHyaA!2m2!1d-0.2064062!2d-78.4945526!3f120!4f100!5f0.7820865974627469"
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>

                    <!-- Viewer 2 -->
                    <div class="tour-360-item" style="transition-delay: 0.1s;">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!4v1775444151019!6m8!1m7!1sCAoSFkNJSE0wb2dLRUlDQWdJRHNzdkd1SXc.!2m2!1d-0.2064062152678696!2d-78.4945525612083!3f175.13555631159855!4f-16.00812007753943!5f0.7820865974627469"
                            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>

                </div>

                <button class="btn btn-gold scroll-anim scroll-fade" style="margin-top: 30px; border-radius: 50px;"
                    onclick="window.location.href='reserva.html'">
                    <i class="fa-solid fa-key" style="margin-right: 8px;"></i>VÍVELO EN PERSONA
                </button>
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>
    <div id="modal-placeholder"></div>
    <div id="modal-tour-placeholder"></div>

    <script src="../assets/js/modal-reserva.js" defer></script>
    <script>
        // Subtle Ken Burns effect on hero
        window.addEventListener('load', () => {
            const bg = document.getElementById('hero-bg');
            if (bg) bg.classList.add('loaded');
        });
    </script>
</body>


</html>
